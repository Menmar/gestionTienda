spring:
  application:
    name: gestionTienda

  threads:
    virtual:
      enabled: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  datasource:
    url: jdbc:postgresql://localhost:5432/gestion_tienda
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

spring:
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000
  fotos:
    directorio: ${FOTOS_DIR:./uploads/fotos}
  admin:
    email: ${ADMIN_EMAIL:}
    nombre: ${ADMIN_NOMBRE:Admin}
    apellidos: ${ADMIN_APELLIDOS:Sistema}
    password: ${ADMIN_PASSWORD:}
  notificaciones:
    callmebot-api-key: ${CALLMEBOT_API_KEY:}
    telegram-bot-token: ${TELEGRAM_BOT_TOKEN:}
    callmebot-base-url: https://api.callmebot.com/whatsapp.php
    telegram-base-url: https://api.telegram.org